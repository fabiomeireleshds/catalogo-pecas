<script>

/* ===============================
   ASSINATURA DIGITAL DO SISTEMA
   Desenvolvedor: Fabio Meireles
   Sistema: Catálogo Inteligente de Peças
   ID Interno: FM-SYS-9A7F-2025
   Observação: Esta marca digital identifica a autoria
   do sistema mesmo que partes visuais sejam alteradas.
   =============================== */

const __FM_SYSTEM_SIGNATURE__ = {
    autor: "Fabio Meireles",
    sistema: "Catálogo Inteligente de Peças",
    id: "FM-SYS-9A7F-2025",
    ano: "2025"
};



let senhaAdmin="91289819"
let pecas=JSON.parse(localStorage.getItem("pecas"))||[]
let editando=null

function limparCodigo(c){

c=c.toUpperCase()

if(c.startsWith("DS")) c=c.replace("DS","")
if(c.startsWith("IS")) c=c.replace("IS","")

return c

}

function inicio(){
resultado.innerHTML=""
buscarCodigo.value=""
}

function extrair(){

let t = medidas.value.toLowerCase()

function num(r){
let m=t.match(r)
return m?m[1].replace(",","."):""
}

function lista(r){
let m=t.match(r)
return m?m[1].replace(/mm/g,"").trim():""
}

let tipo = document.getElementById("tipoPeca").value


if(tipo=="motorcaixa"){
medidas.value=`Informações Complementares:
1 velocidade

Dimensões:
Gerais: Altura (h): mm x Comprimento (l): mm x Largura (b): mm

Hélice:
Altura (h): mm x Diâmetro (Ø): mm`
}


if(tipo=="motorcaixa"){
altura.style.display="block"
comprimento.style.display="block"
largura.style.display="block"
polia.style.display="block"
ranhura.style.display="block"
}

if(tipo=="bobina"){
altura.value = num(/altura.*?(\d+[.,]?\d*)/)
polia.value = num(/externo.*?(\d+[.,]?\d*)/)
ranhura.value = num(/encaixe.*?(\d+[.,]?\d*)/)
angulo.value = num(/interno.*?(\d+[.,]?\d*)/)
}

if(tipo=="valvula"){
altura.value = num(/altura.*?(\d+[.,]?\d*)/)
comprimento.value = num(/comprimento.*?(\d+[.,]?\d*)/)
largura.value = num(/largura.*?(\d+[.,]?\d*)/)

polia.value = lista(/a:\s*\((.*?)\)/)
ranhura.value = lista(/b:\s*\((.*?)\)/)
angulo.value = lista(/c.*?\((.*?)\)/)
pesoL.value = lista(/d:\s*\((.*?)\)/)
}

if(tipo=="condensador"){

// ===== GERAIS (linha única com X) =====
let gerais = t.match(/gerais.*?altura.*?(\d+[.,]?\d*).*?comprimento.*?(\d+[.,]?\d*).*?largura.*?(\d+[.,]?\d*)/)

if(gerais){
altura.value = gerais[1]
comprimento.value = gerais[2]
largura.value = gerais[3]
}

// ===== COLMEIA =====
let colmeia = t.match(/colm[eé]ia.*?altura.*?(\d+[.,]?\d*)/)

if(colmeia){
polia.value = colmeia[1]
}

// ===== CONEXÕES =====

// ORING
let oring = t.match(/ø\s*([\d.,]+)\s*mm.*?ø\s*([\d.,]+)\s*mm/i)

if(oring){
ranhura.value = oring[1]
angulo.value = oring[2]
}

// ROSCA
else{
let rosca = t.match(/(\d\/\d''-\d+\s*unf).*?(\d\/\d''-\d+\s*unf)/i)

if(rosca){
ranhura.value = rosca[1]
angulo.value = rosca[2]
}
}

// ===== PESO =====
pesoL.value = num(/l[ií]quido.*?(\d+[.,]?\d*)/)
pesoB.value = num(/bruto.*?(\d+[.,]?\d*)/)

}


if(tipo=="motorcaixa"){

// MEDIDAS GERAIS
let gerais = t.match(/altura.*?(\d+[.,]?\d*)mm[\s\S]*?comprimento.*?(\d+[.,]?\d*)mm[\s\S]*?largura.*?(\d+[.,]?\d*)mm/)

if(gerais){
altura.value = gerais[1]
comprimento.value = gerais[2]
largura.value = gerais[3]
}

// BASE DE MONTAGEM
let base = t.match(/base.*?altura.*?(\d+[.,]?\d*)mm[\s\S]*?comprimento.*?(\d+[.,]?\d*)mm/)

if(base){
polia.value = base[1]
ranhura.value = base[2]
}

}

if(tipo=="evaporador"){
altura.value = num(/altura.*?(\d+[.,]?\d*)/)
comprimento.value = num(/comprimento.*?(\d+[.,]?\d*)/)
largura.value = num(/largura.*?(\d+[.,]?\d*)/)

polia.value = num(/colm[eé]ia.*altura.*?(\d+[.,]?\d*)/)

// ORING (Ø8,7mm / Ø11,7mm)
let oring = t.match(/ø\s*([\d.,]+)\s*mm.*?ø\s*([\d.,]+)\s*mm/i)

if(oring){
ranhura.value = oring[1]
angulo.value = oring[2]
}
// ROSCA
else{
let rosca = t.match(/(\d\/\d''-\d+\s*unf).*?(\d\/\d''-\d+\s*unf)/i)

if(rosca){
ranhura.value = rosca[1]
angulo.value = rosca[2]
}
}

pesoL.value = num(/l[ií]quido.*?(\d+[.,]?\d*)/)
pesoB.value = num(/bruto.*?(\d+[.,]?\d*)/)
}

}


function login(){

let senha=prompt("Digite a senha")

if(senha===senhaAdmin){
ficha.style.display="block"
}else{
alert("Senha incorreta")
}

}

function fecharFicha(){
ficha.style.display="none"
editando=null
document.getElementById("btnExcluir").style.display="none"
}

function limpar(){
document.querySelectorAll("#ficha input,#ficha textarea").forEach(e=>e.value="")
editando=null
document.getElementById("btnExcluir").style.display="none"
}

function salvar(){

let nova={
observacao:document.getElementById('observacao')?.value||'',

codigo:codigo.value.toUpperCase(),
produto:produto.value,
imagem:imagem.value,
tipo:tipoPeca.value,
altura:Number(altura.value),
comprimento:Number(comprimento.value),
largura:Number(largura.value),
polia:Number(polia.value),
ranhura:ranhura.value,
angulo:angulo.value,
pesoL:pesoL.value,
pesoB:pesoB.value

}

if(editando!==null){
pecas[editando]=nova
editando=null
}else{
pecas.push(nova)
}

localStorage.setItem("pecas",JSON.stringify(pecas)); autoBackup();

alert("Peça salva")

}

function editar(index){

let senha=prompt("Digite a senha para editar")

if(senha!==senhaAdmin){
alert("Acesso negado")
return
}

let p=pecas[index]

codigo.value=p.codigo
produto.value=p.produto
imagem.value=p.imagem||""
altura.value=p.altura
comprimento.value=p.comprimento
largura.value=p.largura
polia.value=p.polia
ranhura.value=p.ranhura
angulo.value=p.angulo
pesoL.value=p.pesoL
pesoB.value=p.pesoB

editando=index

document.getElementById("btnExcluir").style.display="inline-block"

ficha.style.display="block"

}



function img(p){

if(p.imagem && p.imagem.startsWith("http")){
return `<img src="${p.imagem}">`
}

let c=(p.codigo||"").toString().trim().toUpperCase()
let tipo=(tipoBusca.value||"compressor").toLowerCase()

return `<img src="imagens/${tipo}/${c}.webp"
onerror="this.onerror=null;this.src='imagens/${tipo}/${c}.jpg';
this.onerror=function(){this.src='imagens/${tipo}/${c}.png';
this.onerror=function(){this.src='imagens/sem-imagem.png'}}">`

}


function score(a,b){

let total=0
let pontos=0

function comparar(v1,v2){

if(v1===undefined || v2===undefined || v1===null || v2===null) return
if(v1==0 && v2==0) return

let diff=Math.abs(v1-v2)

// cada 1mm reduz 5% da compatibilidade
let s=Math.max(0,100-(diff*5))

total+=s
pontos++

}

comparar(a.altura,b.altura)
comparar(a.comprimento,b.comprimento)
comparar(a.largura,b.largura)
comparar(a.polia,b.polia)

if(pontos===0) return 0

return total/pontos

}


function corScore(s){

if(s>=85) return "green"
if(s>=65) return "blue"
return "red"

}

function barra(s){

let cor=corScore(s)

return `
<div class="barra">
<div class="barraInterna" style="width:${s}%;background:${cor}"></div>
</div>
`

}

function encontrarPeca(codigo){

let base=limparCodigo(codigo)

return pecas.find(p=>limparCodigo(p.codigo)==base)

}

function buscar(){

let p=encontrarPeca(buscarCodigo.value)

let index=pecas.indexOf(p)

if(!p){
resultado.innerHTML="Peça não encontrada"
return
}

let tipoSelecionado = tipoBusca.value

if(p.tipo && p.tipo !== tipoSelecionado){
resultado.innerHTML="<h2>Código do produto errado para o tópico selecionado</h2>"
return
}

resultado.innerHTML=`

<div class="card">

${img(p)}

<div>

<h2>${p.codigo}</h2>
<b>${p.produto}</b>

<div class="medidas">
${fichaPeca(p).replace(/\n/g,"<br>")}
</div>

<button onclick="editar(${index})">Editar peça</button>

</div>

</div>

`

}

function comparar(){

let base=encontrarPeca(buscarCodigo.value)

if(!base){
alert("Peça não encontrada")
return
}

let lista=[]

pecas.forEach(p=>{

if(!p.codigo || !p.produto) return
if(p.codigo==base.codigo) return

/* FILTRAR SOMENTE MESMO TIPO */
if(p.tipo !== base.tipo) return

lista.push({peca:p,score:score(base,p)})

})

lista.sort((a,b)=>b.score-a.score)

lista=lista.slice(0,3)

if(lista.length==0){
resultado.innerHTML=`
<h2 style="text-align:center;color:red">
INFELIZMENTE NÃO ENCONTRAMOS ALGUM PRODUTO COMPATÍVEL
</h2>
`
return
}

let melhor=lista[0]

let html=`
<h2>Peça pesquisada</h2>

<div class="card">

${img(base)}

<div>

<h2>${base.codigo}</h2>
<b>${base.produto}</b>

<div class="medidas">
${fichaPeca(base).replace(/\n/g,"<br>")}
</div>

</div>

</div>

<h2>Comparação técnica</h2>
<div class="compareGrid">`


lista.forEach((item,i)=>{

let p=item.peca
let s=item.score

let dAlt=Math.abs(base.altura-p.altura)
let dComp=Math.abs(base.comprimento-p.comprimento)
let dLarg=Math.abs(base.largura-p.largura)
let dPolia=Math.abs(base.polia-p.polia)

let comentario=`Compatibilidade ${s.toFixed(0)}%. `

if(dAlt==0) comentario+="Altura idêntica. "
else comentario+=`Diferença de ${dAlt}mm na altura. `

if(dComp==0) comentario+="Comprimento equivalente. "
else comentario+=`Diferença de ${dComp}mm no comprimento. `

if(dLarg==0) comentario+="Largura equivalente. "
else comentario+=`Diferença de ${dLarg}mm na largura. `

if(dPolia==0) comentario+="Polia idêntica ao modelo original. "
else comentario+=`Diferença de ${dPolia}mm na polia.`

html+=`

<div class="compareBox">

<h3>Opção ${i+1}</h3>

${img(p)}

<h3>${p.codigo}</h3>
<b>${p.produto}</b>

<div class="medidas">
${fichaPeca(p).replace(/\n/g,"<br>")}
</div>

<h2 style="color:${corScore(s)}">${s.toFixed(0)}%</h2>

${barra(s)}

<div class="laudo">

${(function(){

let medidasHtml=""

// BOBINA
if(base.tipo=="bobina"){
medidasHtml+=analisarMedida("Altura", base.altura, p.altura)+"<br>"
medidasHtml+=analisarMedida("Diâmetro Externo", base.polia, p.polia)+"<br>"
medidasHtml+=analisarMedida("Encaixe", base.ranhura, p.ranhura)+"<br>"
medidasHtml+=analisarMedida("Diâmetro Interno", base.angulo, p.angulo)+"<br>"
}

// CONDENSADOR
else if(base.tipo=="condensador"){
medidasHtml+=analisarMedida("Altura", base.altura, p.altura)+"<br>"
medidasHtml+=analisarMedida("Comprimento", base.comprimento, p.comprimento)+"<br>"
medidasHtml+=analisarMedida("Largura", base.largura, p.largura)+"<br>"
medidasHtml+=analisarMedida("Colmeia", base.polia, p.polia)+"<br>"
medidasHtml+=analisarMedida("Conexão 1", base.ranhura, p.ranhura)+"<br>"
medidasHtml+=analisarMedida("Conexão 2", base.angulo, p.angulo)+"<br>"
}

// EVAPORADOR
else if(base.tipo=="evaporador"){
medidasHtml+=analisarMedida("Altura", base.altura, p.altura)+"<br>"
medidasHtml+=analisarMedida("Comprimento", base.comprimento, p.comprimento)+"<br>"
medidasHtml+=analisarMedida("Largura", base.largura, p.largura)+"<br>"

let data = new Date().toISOString()

historico.unshift({

})

historico=historico.slice(0,10)

localStorage.setItem("pecas_backup_history",JSON.stringify(historico))

}

let tolerancia = 2;


function compararLista(nome, v1, v2){

if(!v1 || !v2) return nome + ": não informado"

let arr1 = v1.toString().split(/[\/]/).map(v=>parseFloat(v.replace(",", ".")))
let arr2 = v2.toString().split(/[\/]/).map(v=>parseFloat(v.replace(",", ".")))

let melhorDiff = Infinity
let encontrouIgual = false

arr1.forEach(a=>{
arr2.forEach(b=>{
if(isNaN(a) || isNaN(b)) return

let diff = Math.abs(a-b)

if(diff === 0){
encontrouIgual = true
}

if(diff < melhorDiff){
melhorDiff = diff
}
})
})

if(encontrouIgual){
return `<div style="background:#dcfce7;padding:6px;border-radius:6px;color:#166534;font-weight:600;margin:2px 0">
✔ ${nome}: COMPATÍVEL (medida idêntica)
</div>`
}

if(melhorDiff <= tolerancia){
return `<div style="background:#fef9c3;padding:6px;border-radius:6px;color:#854d0e;font-weight:600;margin:2px 0">
🟡 ${nome}: próximo (${melhorDiff} mm)
</div>`
}

return `<div style="background:#fee2e2;padding:6px;border-radius:6px;color:#991b1b;font-weight:600;margin:2px 0">
⚠ ${nome}: incompatível (diferença mínima ${melhorDiff} mm)
</div>`
}

function analisarMedida(nome, v1, v2){
if(!v1 || !v2) return nome + ": não informado"

let diff = Math.abs(v1 - v2)

if(diff === 0){
return `<div style="background:#dcfce7;padding:6px;border-radius:6px;color:#166534;font-weight:600;margin:2px 0">
✔ ${nome}: EXATA (${v1} mm)
</div>`
}

if(diff <= tolerancia){
return `<div style="background:#fef9c3;padding:6px;border-radius:6px;color:#854d0e;font-weight:600;margin:2px 0">
🟡 ${nome}: dentro da tolerância (${diff} mm)
</div>`
}

return `<div style="background:#fee2e2;padding:6px;border-radius:6px;color:#991b1b;font-weight:600;margin:2px 0">
⚠ ${nome}: diferença de ${diff} mm
</div>`
}


function barraDiff(v1, v2){
if(!v1 || !v2) return ""
let diff = Math.abs(v1 - v2)
let score = Math.max(0,100 - (diff*5))

return `
<div style="margin-top:5px">
<div style="height:8px;background:#eee;border-radius:6px">
<div style="width:${score}%;height:100%;background:${corScore(score)};border-radius:6px"></div>
</div>
</div>
`
}
